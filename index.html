<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Clear Your Backlog</title>
    <meta name="description" content="Track, rate, and rank the games you actually play. Follow friends, share lists." />

    <base href="/" />

    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f1530" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fbf7ee" media="(prefers-color-scheme: light)" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph defaults — per-page overrides via react-helmet-async -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Clear Your Backlog" />
    <meta property="og:description" content="Track, rate, and rank the games you actually play." />
    <meta property="og:site_name" content="Clear Your Backlog" />
    <meta property="og:url" content="https://clear-your-backlog.vercel.app" />

    <link rel="manifest" href="/manifest.json" />

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Pixel display font for the wordmark only — body text stays system sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    />

    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Clear Your Backlog" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <noscript>
      <div style="font-family: system-ui; padding: 32px; text-align: center;">
        <h1>This app requires JavaScript</h1>
        <p>Please enable JavaScript and refresh the page.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
