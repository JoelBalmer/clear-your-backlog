name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # `railway up` uploads source to Railway and triggers a cloud build.
      # Railway uses the variables already set in your project's dashboard
      # (including VITE_CLERK_PUBLISHABLE_KEY) as Docker build args automatically.
      - name: Deploy to Railway
        id: deploy
        run: railway up --service "$RAILWAY_SERVICE_NAME" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}

      # Poll Railway's GraphQL API until the newest deployment reaches a
      # terminal state (SUCCESS or FAILED/CRASHED). Times out after ~15 min.
      - name: Wait for Railway deployment
        id: wait
        run: |
          echo "Polling Railway for deployment status..."
          STATUS=""
          DEPLOY_URL=""
          for i in $(seq 1 30); do
            RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{
                "query": "query { deployments(input: { serviceId: \"${{ vars.RAILWAY_SERVICE_ID }}\" }) { edges { node { id status url createdAt } } } }"
              }')
            STATUS=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.status // "UNKNOWN"')
            DEPLOY_URL=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.url // ""')
            echo "  Attempt $i/30 — status: $STATUS"
            if [[ "$STATUS" == "SUCCESS" || "$STATUS" == "FAILED" || "$STATUS" == "CRASHED" || "$STATUS" == "REMOVED" ]]; then
              break
            fi
            sleep 30
          done
          echo "final_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Notify success
        if: steps.wait.outputs.final_status == 'SUCCESS'
        run: |
          curl -s \
            -H "Title: ✅ clear-your-backlog deployed" \
            -H "Priority: high" \
            -H "Tags: rocket,white_check_mark" \
            -H "Click: ${{ vars.RAILWAY_APP_URL }}" \
            -d "Deployed successfully.

          ${{ github.event.head_commit.message }}
          ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"

      - name: Notify failure
        if: steps.wait.outputs.final_status != 'SUCCESS'
        run: |
          curl -s \
            -H "Title: ❌ clear-your-backlog deploy failed" \
            -H "Priority: urgent" \
            -H "Tags: rotating_light,x" \
            -H "Click: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "Deployment status: ${{ steps.wait.outputs.final_status }}

          ${{ github.event.head_commit.message }}
          Check the Actions log for details." \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"

      # Fail the job so GitHub also shows a red X if the Railway deploy failed.
      - name: Fail job on bad deploy
        if: steps.wait.outputs.final_status != 'SUCCESS'
        run: |
          echo "Railway deployment ended with status: ${{ steps.wait.outputs.final_status }}"
          exit 1
